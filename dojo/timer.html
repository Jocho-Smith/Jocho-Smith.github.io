<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* p {
  text-align: center;
  font-size: 60px;
  margin-top: 0px;
} */
</style>
</head>
<body>


    <span id="count">10</span> Sekunden
    <br>
    <button onclick="start()">
    START
    </button>
    <audio id="audio" src="Large-tibetan-meditation-bell-sound.mp3" preload="auto"></audio>
<script>

function startTimer(){
  var counter = 10;// time in seconds
  setInterval(function() {
    counter--;
    if (counter >= 0) {
      span = document.getElementById("count");
      span.innerHTML = counter*1;
    }
    if (counter === 0) {
        audio.play();
        alert('Und, wie fuehlst du dich im Vergleich zu vorher? :)');
        clearInterval(counter);
    }
  }, 1000);
}
function start()
{
    document.getElementById("count");//.style="color:green;";
    startTimer();
};

</script>

</body>
</html>
