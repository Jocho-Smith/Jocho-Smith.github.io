<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* p {
  text-align: center;
  font-size: 60px;
  margin-top: 0px;
} */
</style>
</head>
<body>


    <span id="min">00</span>:<span id="count">00</span>
    <br>
    <button onclick="start(10)">
    10 Sek
    </button>
    <button onclick="start(20)">
    20 Sek
    </button>
    <audio id="audio" src="Large-tibetan-meditation-bell-sound.mp3" preload="auto"></audio>
<script>

function startTimer(c){
  var counter = c;// time in seconds
  // var counter = 10;// time in seconds
  setInterval(function() {
    counter--;
    if (counter >= 0) {
      span = document.getElementById("count");
      span.innerHTML = parseInt(counter % 60, 10);
      min = document.getElementById("min");
      min.innerHTML = parseInt(counter / 60, 10);
    }
    if (counter === 0) {
        audio.play();
        alert('Und, wie fuehlst du dich im Vergleich zu vorher? :)');
        clearInterval(counter);
    }
  }, 1000);
}

function start(c)
{
    document.getElementById("count");//.style="color:green;";
    document.getElementById("min");
    startTimer(c);
};


</script>

</body>
</html>
