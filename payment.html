<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .payment-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .payment-container h2 {
            margin-bottom: 20px;
        }
        .payment-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .payment-container input {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .payment-container button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .payment-container button:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <div class="payment-container">
        <h2>Zahlungsinformationen</h2>
        <form>
            <label for="name">(fiktiver) Name</label>
            <input type="text" id="name" name="name" placeholder="Max" required>

            <label for="cardnumber">(fiktive) Kreditkartennummer</label>
            <input type="text" id="cardnumber" name="cardnumber" placeholder="123" required>

            <label for="name">Bist du dabei?</label>
            <input type="text" id="dabei" name="dabei" placeholder="Ja!" required>

            <!-- <a href="now.html"><button type="submit">Zahlung absenden</button></a> -->
        </form>
        <a href="done.html"><button type="submit">Zahlung absenden</button></a>
    </div>
    </body>
    
</html>
